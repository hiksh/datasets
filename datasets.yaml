# Dataset metadata: tags for filtering and discovery.
# A single dataset may carry multiple tags (categories are not exclusive).
#
# Tag vocabulary:
#   general-purpose  — broad network traffic, not environment-specific
#   iot              — consumer IoT devices
#   iiot-ics         — industrial IoT / Industrial Control Systems
#   botnet           — botnet / malware propagation traffic
#   dos-ddos         — Denial-of-Service / Distributed DoS attacks
#   web-attacks      — XSS, SQLi, and other web application attacks
#   brute-force      — credential brute-force / password spraying
#   scan             — port scanning / network reconnaissance
#   infiltration     — lateral movement / infiltration scenarios
#   apt              — Advanced Persistent Threat campaigns
#   anomaly          — anomaly detection focus

cicids2017:
  path: cicids2017/
  tags: [general-purpose, dos-ddos, web-attacks, brute-force, scan, infiltration, botnet]

cicids2018:
  path: cicids2018/
  tags: [general-purpose, dos-ddos, web-attacks, brute-force, scan, infiltration, botnet]

